<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucan-Bank</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <main class="login-container centered-content">
        <div class="login-box">
            <h1>Bienvenido</h1>
            <p>Accede a tu banca online</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ej: admin" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ej: 1234" required>
                </div>

                <button type="submit" class="btn-large">ENTRAR</button>
            </form>
            
            <p id="error-msg" class="hidden">Credenciales incorrectas</p>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
